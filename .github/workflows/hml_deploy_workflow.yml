name: Deploy to Render (HML)

on:
  push:
    branches:
      - hml

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_REPOSITORY }}/bingoapp-frontend:hml-${{ github.run_number }}
            ${{ secrets.DOCKER_HUB_REPOSITORY }}/bingoapp-frontend:hml-latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.HML_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.HML_NEXT_PUBLIC_WS_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Render
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
